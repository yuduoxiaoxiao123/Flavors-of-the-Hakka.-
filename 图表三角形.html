<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗数据三角形图表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            font-family: 'Ma Shan Zheng', 'ZCOOL XiaoWei', 'STXingkai', '霞鹜臻楷 GB 常规', 'KaiTi', '楷体', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 6px;
            overflow: hidden;
        }
        .chart-wrap {
            background: url('images/图表/非遗背景.png') center/cover no-repeat;
            border-radius: 12px;
            padding: 20px 25px 18px 25px;
            max-width: 1200px;
            width: 100%;
            min-height: auto;
            position: relative;
        }
        .chart-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 248, 235, 0.78);
            border-radius: 12px;
            pointer-events: none;
            z-index: 0;
        }
        .chart-inner {
            position: relative;
            z-index: 1;
        }
        h2 {
            text-align: center;
            font-size: 1.5rem;
            color: #3d2b1a;
            letter-spacing: 4px;
            text-shadow: 0 1px 3px rgba(255,248,235,0.5);
            margin: 0 0 6px 0;
            font-weight: normal;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 1060px;
            height: auto;
        }
    </style>
</head>
<body>
<div class="chart-wrap">
    <div class="chart-inner">
        <h2>🏮 龙岩五县非遗数据总览</h2>
        <canvas id="triChart" width="1060" height="420"></canvas>
    </div>
</div>
<script>
(function() {
    // ===== 数据 =====
    const counties = [
        { name: "永定区", total: 131, food: 38, totalPct: 30.1, foodPct: 25.0 },
        { name: "上杭县", total: 96,  food: 35, totalPct: 22.1, foodPct: 23.0 },
        { name: "武平县", total: 70,  food: 30, totalPct: 16.1, foodPct: 19.7 },
        { name: "连城县", total: 47,  food: 28, totalPct: 10.9, foodPct: 18.4 },
        { name: "长汀县", total: 91,  food: 21, totalPct: 20.9, foodPct: 13.8 }
    ];

    const canvas = document.getElementById('triChart');
    const ctx = canvas.getContext('2d');

    // 高DPI适配
    const dpr = window.devicePixelRatio || 1;
    const W = 1060, H = 420;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    // ===== 配色（温润雅致，与非遗背景协调）=====
    const bigFill   = 'rgba(180, 100, 60, 0.55)';
    const bigStroke = 'rgba(130, 60, 30, 0.85)';
    const smallFill   = 'rgba(200, 155, 55, 0.60)';
    const smallStroke = 'rgba(155, 110, 25, 0.85)';
    const textColor  = '#3a2818';
    const lineColor  = 'rgba(120, 80, 50, 0.45)';
    const numColor   = '#4a3520';
    const foodNumColor = '#8a5a18';

    // ===== 计算边长 =====
    const maxTotalPct = Math.max(...counties.map(d => d.totalPct));
    const maxFoodPct  = Math.max(...counties.map(d => d.foodPct));
    const MAX_BIG_SIDE = 195;

    const bigSides = counties.map(d =>
        MAX_BIG_SIDE * Math.sqrt(d.totalPct / maxTotalPct)
    );

    const maxFoodSide = 130;
    let rawSmallSides = counties.map(d =>
        maxFoodSide * Math.sqrt(d.foodPct / maxFoodPct)
    );

    // 确保小三角形不超出大三角形
    const finalSmallSides = rawSmallSides.map((s, i) =>
        Math.min(s, bigSides[i] * 0.75)
    );

    // ===== 布局 =====
    const marginL = 65, marginR = 65;
    const availW = W - marginL - marginR;
    const groupW = availW / counties.length;
    const baseY = H - 80;

    // ===== 工具函数 =====
    function getTriVerts(cx, cy, side) {
        const h = (Math.sqrt(3) / 2) * side;
        return [
            { x: cx,          y: cy - h * 2/3 },
            { x: cx - side/2, y: cy + h * 1/3 },
            { x: cx + side/2, y: cy + h * 1/3 }
        ];
    }

    function drawTri(verts, fill, stroke, lw) {
        if (!verts || verts.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(verts[0].x, verts[0].y);
        ctx.lineTo(verts[1].x, verts[1].y);
        ctx.lineTo(verts[2].x, verts[2].y);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = stroke;
        ctx.lineWidth = lw || 2;
        ctx.stroke();
    }

    // ===== 逐县绘制 =====
    for (let i = 0; i < counties.length; i++) {
        const d = counties[i];
        const bigS = bigSides[i];
        const smallS = finalSmallSides[i];

        const cx = marginL + i * groupW + groupW / 2;
        const bigH = (Math.sqrt(3) / 2) * bigS;
        const cy = baseY - bigH / 3;

        // ---- 大三角形 ----
        const bigV = getTriVerts(cx, cy, bigS);
        drawTri(bigV, bigFill, bigStroke, 2);

        // ---- 小三角形（同心缩放） ----
        const scale = smallS / bigS;
        const smallV = bigV.map(v => ({
            x: cx + (v.x - cx) * scale,
            y: cy + (v.y - cy) * scale
        }));
        drawTri(smallV, smallFill, smallStroke, 1.8);

        // ---- 总数标注在顶点上方 ----
        ctx.font = 'bold 18px "Ma Shan Zheng", "ZCOOL XiaoWei", "STXingkai", "KaiTi", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = textColor;
        ctx.fillText(String(d.total), bigV[0].x, bigV[0].y - 6);

        // ---- 百分比小字在总数旁 ----
        ctx.font = '12px "Ma Shan Zheng", "ZCOOL XiaoWei", "KaiTi", serif';
        ctx.fillStyle = numColor;
        ctx.textBaseline = 'bottom';
        ctx.fillText('(' + d.totalPct + '%)', bigV[0].x, bigV[0].y - 26);

        // ---- 美食数据写在小三角形中心 ----
        ctx.font = 'bold 15px "Ma Shan Zheng", "ZCOOL XiaoWei", "STXingkai", "KaiTi", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = foodNumColor;
        ctx.fillText(String(d.food), cx, cy + 1);
        // 美食百分比小字
        ctx.font = '10px "Ma Shan Zheng", "ZCOOL XiaoWei", "KaiTi", serif';
        ctx.fillStyle = '#9a6b28';
        ctx.fillText(d.foodPct + '%', cx, cy + 18);

        // ---- 大三角形下方横线 ----
        const lineY = baseY + 12;
        ctx.beginPath();
        ctx.moveTo(cx - bigS * 0.55, lineY);
        ctx.lineTo(cx + bigS * 0.55, lineY);
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // ---- 县名在横线下方 ----
        ctx.font = 'bold 17px "Ma Shan Zheng", "ZCOOL XiaoWei", "STXingkai", "KaiTi", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillStyle = textColor;
        ctx.fillText(d.name, cx, lineY + 5);
    }

    // ===== 图例（放在右上角图表区，不单独占用顶部空间）=====
    const legX = W - 200, legY = 6;
    ctx.font = '11px "Ma Shan Zheng", "ZCOOL XiaoWei", "KaiTi", serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    // 大三角图例
    ctx.fillStyle = bigFill;
    ctx.fillRect(legX, legY, 14, 14);
    ctx.strokeStyle = bigStroke;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(legX, legY, 14, 14);
    ctx.fillStyle = textColor;
    ctx.fillText('非遗总数', legX + 18, legY);

    // 小三角图例
    ctx.fillStyle = smallFill;
    ctx.fillRect(legX + 82, legY, 14, 14);
    ctx.strokeStyle = smallStroke;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(legX + 82, legY, 14, 14);
    ctx.fillStyle = textColor;
    ctx.fillText('美食非遗', legX + 100, legY);
})();
</script>
</body>
</html>
